# PQY 自动化引擎配置

engine:
  host: "127.0.0.1"
  port: 5555
  timeout: 30000

ocr:
  engine: "paddleocr"  # paddleocr | wechat_native
  language: "ch"
  use_angle_cls: true

human_sim:
  mouse:
    speed_range: [0.3, 1.2]
    pause_probability: 0.1
    overshoot_range: [2, 5]
    trajectory: "bezier"  # bezier | linear
  keyboard:
    wpm_range: [40, 80]
    typo_probability: 0.02
    pause_probability: 0.05
  timing:
    distribution: "gamma"  # gamma | uniform | normal
    shape: 2.0
    scale: 0.3

risk_control:
  enabled: true
  message:
    max_per_minute: 5
    max_per_hour: 50
    cooldown_ms: 3000
  moments:
    max_per_day: 2
    cooldown_ms: 300000
  like:
    max_per_minute: 2
    cooldown_ms: 10000
  detection:
    check_popup: true
    check_function_limit: true
    check_network_anomaly: true

recovery:
  auto_recovery: true
  recovery_delay: 300
  max_retry: 3

logging:
  level: "INFO"
  file: "logs/engine.log"
  rotation: "10 MB"
